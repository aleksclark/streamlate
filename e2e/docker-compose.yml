services:
  server:
    build:
      context: ..
      dockerfile: e2e/docker/Dockerfile.server
    networks:
      lan:
        ipv4_address: 192.168.0.200
    environment:
      STREAMLATE_JWT_SECRET: "e2e-test-secret"
      STREAMLATE_LOG_LEVEL: "debug"
      STREAMLATE_BIND: "0.0.0.0:8080"
      STREAMLATE_DB_PATH: "/data/streamlate-e2e.db"
      STREAMLATE_ACCESS_TOKEN_TTL: "300"
      STREAMLATE_RECORDING_DIR: "/tmp/recordings"
      STREAMLATE_ADMIN_PASSWORD: "password"
      WEBRTC_PUBLIC_IP: "192.168.0.200"
      WEBRTC_UDP_PORT_MIN: "50000"
      WEBRTC_UDP_PORT_MAX: "50100"
    volumes:
      - server-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/system/health"]
      interval: 2s
      timeout: 5s
      retries: 30

  translation-client:
    build:
      context: ..
      dockerfile: e2e/docker/Dockerfile.translation-client
    networks:
      lan:
        ipv4_address: 192.168.0.201
    volumes:
      - ./docker/nginx-spa-macvlan.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy

  listener-client:
    build:
      context: ..
      dockerfile: e2e/docker/Dockerfile.listener-client
    networks:
      lan:
        ipv4_address: 192.168.0.202
    volumes:
      - ./docker/nginx-spa-macvlan.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy

  abc-sim:
    build:
      context: ..
      dockerfile: e2e/docker/Dockerfile.abc-sim
    networks:
      lan:
        ipv4_address: 192.168.0.203
    depends_on:
      server:
        condition: service_healthy
    environment:
      ABC_SERVER_URL: "http://192.168.0.200:8080"
      ABC_ID: "${ABC_ID:-}"
      ABC_SECRET: "${ABC_SECRET:-}"
      ABC_LISTEN_PORT: "9090"

networks:
  lan:
    driver: macvlan
    driver_opts:
      parent: enp14s0
    ipam:
      config:
        - subnet: 192.168.0.0/20
          gateway: 192.168.0.1
          ip_range: 192.168.0.200/29

volumes:
  server-data:
